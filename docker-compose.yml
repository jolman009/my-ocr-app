# NOTE: Local PostgreSQL is no longer used. Database is Supabase (shared with production).
# To restore local dev DB, uncomment services and run: docker compose up -d
version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: receipt_ocr_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receipt_ocr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
